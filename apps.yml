repository:
  name: LazyCat 第三方仓库
  description: 基于 GitHub Pages 的 LazyCat 应用仓库。
  homepage: https://zerokaze420.github.io/lur/
  owner: zerokaze420
  repo: lur
apps:
  - id: hello-lazycat
    source: apps/hello-lazycat
    summary: 不依赖 lzc-cli 构建的最小静态 LPK。
    categories:
      - demo
      - static
  - id: attic
    source:
      git: https://github.com/zerokaze420/lazy-attic.git
      rev: 402385eb48c8af545dda8099c65f8d3ef19eaf38
    summary: 带轻量 Web 控制台的 Nix 二进制缓存服务器。
    categories:
      - developer
      - cache
      - nix
    build:
      type: command
      command:
        - nix
        - build
        - .#lpk
      artifact: result/*.lpk
  - id: romm
    source:
      git: https://github.com/zerokaze420/romm.git
      rev: e0f15bd4849385c0779abb6e437c3e1500c210b1
    summary: 自托管 ROM 管理器和浏览器游戏播放器。
    categories:
      - game
      - emulator
      - media
    build:
      type: lzc
