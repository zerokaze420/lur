<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello LazyCat</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #152033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 40px));
        padding: 40px;
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgb(21 32 51 / 12%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 8vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #536176;
        font-size: 18px;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello LazyCat</h1>
      <p>
        这个页面会由 GitHub Actions 按 manifest.yml、package.yml、
        content.tar 和最终 tar 归档手工打包成 LPK。
      </p>
    </main>
  </body>
</html>
